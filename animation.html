<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gradient reveal along path</title>

<style>
html,body{
    margin:0;
    height:100%;
    display:grid;
    place-items:center;
    background:#1a1a1a;
}

svg{
    width:900px;
    height:500px;
}
</style>
</head>
<body>

<svg viewBox="0 0 900 500">

    <defs>

        <!-- Color that will be revealed -->
        <linearGradient id="grad"
            x1="0%"
            y1="0%"
            x2="100%"
            y2="0%">
            <stop offset="0%" stop-color="#ff3b3b"/>
            <stop offset="35%" stop-color="#ffdb4d"/>
            <stop offset="65%" stop-color="#36ff89"/>
            <stop offset="100%" stop-color="#2b7fff"/>
        </linearGradient>

        <!-- Animated mask -->
        <mask id="paintMask">

            <!-- black = hidden -->
            <rect width="100%" height="100%" fill="black"/>

            <!-- white stroke = revealed -->
            <path id="brush"
                  d="
                  M100 260
                  C180 80,
                   320 420,
                   430 220
                  S640 120,
                   800 280"
                  fill="none"
                  stroke="white"
                  stroke-width="80"
                  stroke-linecap="round"
                  stroke-linejoin="round"/>

        </mask>

    </defs>

    <!-- background -->
    <rect width="100%" height="100%" fill="#252525"/>

    <!-- gradient hidden by animated mask -->
    <rect width="100%"
          height="100%"
          fill="url(#grad)"
          mask="url(#paintMask)"/>

    <!-- optional guide -->
    <path
        d="M100 260
           C180 80,
            320 420,
            430 220
           S640 120,
            800 280"
        fill="none"
        stroke="#ffffff22"
        stroke-width="2"/>

</svg>

<script>

const path = document.getElementById("brush");
const length = path.getTotalLength();

path.style.strokeDasharray = length;
path.style.strokeDashoffset = length;

let start = null;
const duration = 3000;

function animate(t){

    if(!start) start = t;

    const p = Math.min((t-start)/duration,1);

    path.style.strokeDashoffset = length*(1-p);

    if(p<1)
        requestAnimationFrame(animate);
}

requestAnimationFrame(animate);

</script>

</body>
</html>
